services:
  smokeping:
    image: linuxserver/smokeping@sha256:311d44c5a162f724b8d48f7a26bd604152d409f6249197ff2c7190f496db87d9
    container_name: smokeping
    environment:
      - PUID=1001
      - PGID=1001
      - TZ=UTC
    volumes:
      - ./smokeping/config:/config
      - ./smokeping/data:/data
      - ./smokeping/etc/config:/etc/smokeping/config
      - ./smokeping/etc/ssmtp.conf:/etc/ssmtp/ssmtp.conf
    ports:
      - 8099:80
    mem_limit: 4096m
    restart: unless-stopped